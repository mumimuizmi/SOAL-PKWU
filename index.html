<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Latihan Soal PKKWU Interaktif</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f5f7fa;
            --card-color: #ffffff;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #4a90e2, #357abd);
            color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .score-board {
            position: sticky;
            top: 10px;
            background: var(--card-color);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            font-weight: bold;
            z-index: 100;
        }

        .question-card {
            background: var(--card-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .option-item {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            padding: 12px 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-item:hover {
            background: #e9ecef;
            border-color: #ced4da;
        }

        /* State ketika opsi dipilih */
        .option-item.correct {
            background-color: #d4edda !important;
            border-color: var(--success-color) !important;
            color: #155724;
            font-weight: bold;
        }

        .option-item.wrong {
            background-color: #f8d7da !important;
            border-color: var(--error-color) !important;
            color: #721c24;
        }

        /* Menonaktifkan klik setelah terjawab */
        .disabled {
            pointer-events: none;
        }

        .explanation {
            margin-top: 15px;
            padding: 10px 15px;
            border-left: 4px solid var(--primary-color);
            background: #eef5fc;
            border-radius: 0 6px 6px 0;
            display: none;
        }
    </style>
</head>
<body>

        {
            q: "Dalam struktur proposal usaha, bagian yang berisi strategi pemasaran dan target konsumen adalah…",
            options: ["Rencana operasional", "Analisis pasar dan pemasaran", "Profil usaha", "Penutup", "Latar belakang"],
            ans: 1
        },
        {
            q: "Seorang siswa akan mempresentasikan proposal usaha, tetapi ia hanya fokus menyiapkan isi materi tanpa memperhatikan media presentasi. Dampak yang paling mungkin terjadi adalah…",
            options: [
                "Audiens lebih fokus pada isi dibanding tampilan",
                "Presentasi tetap berjalan efektif tanpa hambatan",
                "Audiens kesulitan memahami karena kurang visualisasi",
                "Waktu presentasi menjadi lebih singkat",
                "Penyaji terlihat lebih profesional"
            ],
            ans: 2
        },
        {
            q: "Jika seorang presenter menggunakan terlalu banyak teks dalam slide, maka kemungkinan yang terjadi adalah…",
            options: [
                "Audiens lebih cepat memahami materi",
                "Presentasi menjadi lebih menarik",
                "Audiens bosan dan kehilangan fokus",
                "Penyaji lebih percaya diri",
                "Waktu presentasi menjadi lebih efisien"
            ],
            ans: 2
        }
    ];

    let correctScore = 0;
    let wrongScore = 0;

    const quizContainer = document.getElementById('quiz-container');
    const correctCountEl = document.getElementById('correct-count');
    const wrongCountEl = document.getElementById('wrong-count');

    // Fungsi Render Soal
    function loadQuiz() {
        quizData.forEach((data, qIndex) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-card-${qIndex}`;

            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerHTML = `${qIndex + 1}. ${data.q}`;
            card.appendChild(qText);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';

            data.options.forEach((option, oIndex) => {
                const optionItem = document.createElement('li');
                optionItem.className = 'option-item';
                // Memberikan penanda opsi huruf A, B, C, D, E
                const label = String.fromCharCode(65 + oIndex); 
                optionItem.innerText = `${label}. ${option}`;
                
                // Tambahkan event click langsung respon
                optionItem.addEventListener('click', () => handleAnswer(qIndex, oIndex, data.ans));
                
                optionsList.appendChild(optionItem);
            });

            card.appendChild(optionsList);

            // Elemen kunci tambahan (opsional jika ingin menampilkan info kunci setelah klik)
            const explanation = document.createElement('div');
            explanation.className = 'explanation';
            explanation.id = `ex-${qIndex}`;
            explanation.innerHTML = `<strong>Kunci Jawaban:</strong> ${String.fromCharCode(65 + data.ans)}`;
            card.appendChild(explanation);

            quizContainer.appendChild(card);
        });
    }

    // Fungsi Handle Koreksi Langsung
    function handleAnswer(questionIndex, selectedIndex, correctIndex) {
        const card = document.getElementById(`q-card-${questionIndex}`);
        const options = card.getElementsByClassName('option-item');
        const explanation = document.getElementById(`ex-${questionIndex}`);

        // 1. Kunci semua opsi pada soal ini agar tidak bisa diklik ulang
        for (let i = 0; i < options.length; i++) {
            options[i].classList.add('disabled');
        }

        // 2. Berikan warna hijau pada jawaban yang benar secara sistem
        options[correctIndex].classList.add('correct');

        // 3. Periksa jika pilihan user benar atau salah
        if (selectedIndex === correctIndex) {
            correctScore++;
            correctCountEl.innerText = correctScore;
        } else {
            // Jika salah, warnai opsi pilihan user dengan warna merah
            options[selectedIndex].classList.add('wrong');
            wrongScore++;
            wrongCountEl.innerText = wrongScore;
        }

        // 4. Tampilkan kunci tertulis di bawahnya
        explanation.style.display = 'block';
    }

    // Jalankan Kuis saat halaman dibuka
    window.onload = loadQuiz;
</script>
